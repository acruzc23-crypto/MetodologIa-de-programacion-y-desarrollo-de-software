<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Potencia A^B</title>
</head>
<body>
    <form id="formPotencia">
        <label>Ingrese la base (A): </label>
        <input type="number" id="base" required>
        <br><br>
        <label>Ingrese el exponente (B): </label>
        <input type="number" id="exponente" required>
        <br><br>
        <button type="submit">Calcular</button>
    </form>

        <p id="resultado"></p>

    <script>
        //Gualpa Gonzalez Jhon Jairo.
        document.getElementById("formPotencia").addEventListener("submit", function(event) {
        event.preventDefault(); // Evita recargar la página

        var A = parseFloat(document.getElementById("base").value);
        var B = parseInt(document.getElementById("exponente").value);
        var resultado = 1;

        if (B === 0) {
        resultado = 1;
        }
        else if (B > 0) {
        for (var i = 1; i <= B; i++) {
             resultado = resultado * A;
        }
        }
        else {
        var positivo = -B;
        for (var i = 1; i <= positivo; i++) {
            resultado = resultado * A;
        }
            resultado = 1 / resultado;
        }
            document.getElementById("resultado").textContent = "El resultado de " + A + "^" + B + " es: " + resultado;
        });
    </script>

</body>
</html>
