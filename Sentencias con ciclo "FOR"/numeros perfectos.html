<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Números Perfectos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: rgb(255, 255, 255);
            text-align: center;
            color: #333;
        }

        h1 {
            color: rgb(0, 0, 0);
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 300px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        th {
            background: #007BFF;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>

    <h1>Números Perfectos</h1>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Número Perfecto</th>
            </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>

    <script>
        //Cruz Chalen Alfredo Josua.
        let tabla = document.getElementById("tabla");
        let contador = 1;

        for (let num = 2; num <= 8128; num++) {
            let suma = 0;

            for (let i = 1; i <= num / 2; i++) {
                if (num % i === 0) {
                    suma += i;
                }
            }

            if (suma === num) {
                let fila = "<tr><td>" + contador + "</td><td>" + num + "</td></tr>";
                tabla.innerHTML += fila;
                contador++;
            }
        }
    </script>

</body>
</html>
