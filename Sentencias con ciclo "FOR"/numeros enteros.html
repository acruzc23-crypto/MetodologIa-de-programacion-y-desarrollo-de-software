<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Operaciones matemática entre enteros</title>

<style>
    body {
        font-family: Arial; background: rgb(255, 255, 255);
    }
    .contenedor {
        width: 400px; margin: 50px auto; padding: 20px; border: 2px solid rgb(0, 0, 0); 
        text-align: center; background: #ffffff;
    }
    input {
        margin: 10px; padding: 5px;width: 200px;
    }
    button {
        padding: 10px; margin: 5px; cursor: pointer;
    }
    .resultado {
        margin-top: 20px; padding: 15px; border: 2px solid black;
        height: 150px; text-align: left; background: white;
    }
</style>
</head>
<body>
    <div class="contenedor">
        <h2>Operaciones de multiplo y potencia</h2>
        <input type="number" id="a" placeholder="Ingrese primer valor"><br>
        <input type="number" id="b" placeholder="Ingrese segundo valor"><br>
        <button onclick="calcular()">Ejecutar</button>
        <button onclick="limpiar()">Limpiar</button>
        <div class="resultado" id="salida"></div>
    </div>
    <script>
        //Cruz Chalen Alfredo Josua.
    function calcular() {
        let a = Number(document.getElementById("a").value);
        let b = Number(document.getElementById("b").value);
        let texto = "";

        let suma = 0;
        texto += "<b>Multiplicación:</b><br>";
        texto += a + " * " + b + " = ";
        for (let i = 1; i <= b; i++) {
        suma += a;
        texto += a;
        if (i < b) texto += " + ";}
        texto += " = " + suma + "<br><br>";

        let potencia = 1;
        texto += "<b>Potencia:</b><br>";
        texto += a + " ^ " + b + " = ";
        for (let i = 1; i <= b; i++) {
        potencia *= a;
        texto += a;
        if (i < b) texto += " * ";}
        
        texto += " = " + potencia;
        document.getElementById("salida").innerHTML = texto;}
        
    function limpiar() {
    document.getElementById("salida").innerHTML = "";
    document.getElementById("a").value = "";
    document.getElementById("b").value = "";}
    </script>
    </body>
</html>
